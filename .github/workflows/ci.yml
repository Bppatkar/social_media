name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: ./server

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Run Tests
        run: npm test

      - name: Debug Secrets
        run: |
          echo "MONGO_URI exists?"
          [ -n "$MONGO_URI" ] && echo YES || echo NO

          echo "JWT_SECRET exists?"
          [ -n "$JWT_SECRET" ] && echo YES || echo NO

          echo "JWT_REFRESH_SECRET exists?"
          [ -n "$JWT_REFRESH_SECRET" ] && echo YES || echo NO