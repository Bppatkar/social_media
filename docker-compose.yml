version: '3.9'

services:
  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://server:8000/api
        NEXT_PUBLIC_SOCKET_URL: http://server:8000

    ports:
      - '3000:3000'

    depends_on:
      - server

  server:
    build:
      context: ./server

    ports:
      - '8000:8000'

    env_file:
      - ./server/.env
