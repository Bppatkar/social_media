version: "3.9"

services:
  backend:
    build: .
    container_name: social-media-backend

    ports:
      - "8000:8000"

    env_file:
      - .env
    
    depends_on:
      - redis
      
    restart: unless-stopped

  redis:
    image: "redis:7-alpine"
    container_name: social-media-redis
    ports:
      - "6379:6379"

    restart: unless-stopped
    volumes:
      - redis-data:/data
volumes:
  redis-data: 